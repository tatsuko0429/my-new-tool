<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#f4efe5">
  <meta name="application-name" content="SVG = 画像">
  <meta name="apple-mobile-web-app-title" content="SVG = 画像">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="site.webmanifest">
  <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png">
  <link rel="shortcut icon" href="assets/icons/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png">
  <title>SVG = 画像</title>
  <style>
    :root {
      color-scheme: light;
      --bg-base: #f4efe5;
      --surface: rgba(255, 252, 246, 0.88);
      --surface-muted: rgba(255, 255, 255, 0.72);
      --text-main: #203238;
      --text-sub: #56656b;
      --line: rgba(32, 50, 56, 0.12);
      --line-strong: rgba(32, 50, 56, 0.22);
      --brand: #0e7c6b;
      --brand-strong: #0a5e52;
      --danger: #b54c3a;
      --shadow: 0 24px 56px rgba(25, 47, 50, 0.16);
      --radius-xl: 28px;
      --transition: 180ms ease;
      --touch-target: 48px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(223, 123, 44, 0.14), transparent 34%),
        radial-gradient(circle at top right, rgba(14, 124, 107, 0.18), transparent 28%),
        linear-gradient(180deg, #f9f4ea 0%, var(--bg-base) 48%, #edf5f2 100%);
      line-break: strict;
      word-break: normal;
      overflow-wrap: break-word;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      border-radius: 999px;
      pointer-events: none;
      opacity: 0.55;
      filter: blur(12px);
      z-index: 0;
    }

    body::before {
      top: 6vh;
      right: 6vw;
      width: 260px;
      height: 260px;
      background: rgba(14, 124, 107, 0.12);
    }

    body::after {
      bottom: 10vh;
      left: 4vw;
      width: 320px;
      height: 320px;
      background: rgba(223, 123, 44, 0.12);
    }

    button,
    textarea {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
      border-radius: 999px;
      min-height: var(--touch-target);
      padding: 0 20px;
      transition:
        transform var(--transition),
        background-color var(--transition),
        box-shadow var(--transition),
        opacity var(--transition);
      text-align: center;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.46;
      transform: none;
      box-shadow: none;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1520px;
      margin: 0 auto;
      padding: clamp(18px, 3vw, 36px);
    }

    .shell {
      backdrop-filter: blur(10px);
      background: linear-gradient(180deg, rgba(255, 250, 243, 0.92), rgba(250, 246, 238, 0.86));
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 36px;
      box-shadow: var(--shadow);
      padding: clamp(18px, 3vw, 34px);
    }

    .hero {
      display: grid;
      gap: 18px;
      margin-bottom: 24px;
      text-align: center;
      animation: rise-in 360ms ease both;
    }

    .hero-title {
      margin: 0;
      color: var(--brand-strong);
      font-size: clamp(2rem, 3.8vw, 3.6rem);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: 0.06em;
      text-wrap: balance;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(0, 0.92fr) minmax(300px, 0.88fr);
      gap: 22px;
      align-items: start;
    }

    .panel {
      display: grid;
      gap: 16px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.74);
      border-radius: var(--radius-xl);
      padding: clamp(16px, 2.4vw, 24px);
      box-shadow: 0 14px 26px rgba(27, 48, 52, 0.08);
      animation: rise-in 380ms ease both;
    }

    .panel-head {
      display: grid;
      gap: 8px;
      justify-items: center;
      text-align: center;
    }

    .panel-head--between {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px 16px;
      flex-wrap: wrap;
      text-align: left;
    }

    .panel-head--between .panel-title {
      flex: 1 1 220px;
    }

    .panel-title {
      margin: 0;
      font-size: 1.16rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-align: center;
    }

    .panel-section {
      display: grid;
      gap: 12px;
    }

    .panel-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(32, 50, 56, 0.14), transparent);
    }

    .panel-subtitle {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-align: center;
    }

    .panel-action-button {
      min-height: 34px;
      padding: 0 16px;
      border-radius: 999px;
    }

    .panel-meta-text {
      color: var(--text-sub);
      font-size: 0.84rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-align: center;
    }

    .editor-wrap {
      display: grid;
      gap: 12px;
    }

    .editor-field {
      position: relative;
      display: grid;
    }

    .editor {
      width: 100%;
      min-height: 360px;
      resize: vertical;
      border-radius: 22px;
      border: 1px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.9);
      color: var(--text-main);
      padding: 18px;
      line-height: 1.65;
      letter-spacing: 0.01em;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      text-align: left;
    }

    .editor--compact {
      min-height: 128px;
    }

    .editor[readonly] {
      background: rgba(246, 241, 232, 0.92);
      color: var(--text-sub);
    }

    .editor:focus {
      outline: 3px solid rgba(14, 124, 107, 0.18);
      border-color: rgba(14, 124, 107, 0.44);
    }

    .status-line {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      color: var(--brand-strong);
      font-size: 0.88rem;
      font-weight: 600;
      text-align: center;
      line-height: 1.7;
      pointer-events: none;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.84);
      z-index: 2;
    }

    .status-line.is-hidden {
      opacity: 0;
      visibility: hidden;
    }

    .status-line.is-error {
      color: var(--danger);
    }

    .warning-box {
      display: none;
      gap: 8px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(223, 123, 44, 0.12);
      color: #7f4c1b;
      font-size: 0.9rem;
      line-height: 1.6;
      text-align: center;
    }

    .warning-box.is-visible {
      display: grid;
    }

    .text-field-list {
      display: grid;
      gap: 12px;
    }

    .text-field-empty {
      padding: 16px;
      border-radius: 18px;
      background: var(--surface-muted);
      border: 1px dashed var(--line-strong);
      color: var(--text-sub);
      line-height: 1.7;
      text-align: center;
    }

    .text-field-card {
      display: grid;
      gap: 8px;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.82);
    }

    .text-field-card.is-focused {
      border-color: rgba(14, 124, 107, 0.34);
      box-shadow: 0 14px 24px rgba(14, 124, 107, 0.08);
    }

    .text-field-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-main);
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 1.5;
      text-align: center;
      text-wrap: pretty;
    }

    .text-field-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(14, 124, 107, 0.1);
      color: var(--brand-strong);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .text-field-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .text-field-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: rgba(32, 50, 56, 0.06);
      color: var(--text-sub);
      font-size: 0.78rem;
      text-align: center;
    }

    .text-field-input {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.92);
      color: var(--text-main);
      line-height: 1.65;
      text-align: left;
    }

    .text-bulk-input {
      min-height: min(42vh, 320px);
      padding: 16px 18px;
    }

    .text-field-input:focus {
      outline: 3px solid rgba(14, 124, 107, 0.16);
      border-color: rgba(14, 124, 107, 0.4);
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .primary-button {
      background: linear-gradient(180deg, #0e7c6b, #0a5e52);
      color: #fff9f1;
      box-shadow: 0 12px 20px rgba(14, 124, 107, 0.22);
    }

    .secondary-button {
      background: linear-gradient(180deg, #df7b2c, #c7651d);
      color: #fff7ef;
      box-shadow: 0 12px 20px rgba(223, 123, 44, 0.2);
    }

    .subtle-button {
      background: rgba(255, 255, 255, 0.85);
      color: var(--text-main);
      border: 1px solid var(--line);
      box-shadow: 0 10px 18px rgba(27, 48, 52, 0.08);
    }

    .danger-button {
      background: rgba(181, 76, 58, 0.12);
      color: var(--danger);
      border: 1px solid rgba(181, 76, 58, 0.2);
    }

    .preview-stage {
      position: relative;
      min-height: 420px;
      padding: 18px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background:
        linear-gradient(45deg, rgba(0, 0, 0, 0.04) 25%, transparent 25%, transparent 75%, rgba(0, 0, 0, 0.04) 75%),
        linear-gradient(45deg, rgba(0, 0, 0, 0.04) 25%, transparent 25%, transparent 75%, rgba(0, 0, 0, 0.04) 75%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.88), rgba(247, 244, 238, 0.9));
      background-position: 0 0, 12px 12px, 0 0;
      background-size: 24px 24px, 24px 24px, cover;
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .preview-stage.is-empty {
      color: var(--text-sub);
      text-align: center;
      line-height: 1.7;
      padding: 24px;
    }

    .preview-stage > svg,
    .preview-stage > img {
      max-width: 100%;
      max-height: 100%;
      height: auto;
      width: auto;
      display: block;
      filter: drop-shadow(0 10px 16px rgba(17, 37, 40, 0.12));
    }

    .preview-stage [data-edit-highlight="true"] {
      filter:
        drop-shadow(0 0 0.6px rgba(14, 124, 107, 0.92))
        drop-shadow(0 0 8px rgba(14, 124, 107, 0.34));
    }

    .history-tools {
      display: grid;
      gap: 12px;
    }

    .page-footer {
      margin-top: 20px;
      display: flex;
      justify-content: center;
    }

    .button-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: var(--touch-target);
      padding: 0 20px;
      border-radius: 999px;
      text-decoration: none;
      transition:
        transform var(--transition),
        background-color var(--transition),
        box-shadow var(--transition),
        opacity var(--transition);
      text-align: center;
    }

    .button-link:hover {
      transform: translateY(-1px);
    }

    .history-list {
      display: grid;
      gap: 12px;
      max-height: 760px;
      overflow: auto;
      padding-right: 4px;
    }

    .history-list::-webkit-scrollbar {
      width: 8px;
    }

    .history-list::-webkit-scrollbar-thumb {
      background: rgba(32, 50, 56, 0.16);
      border-radius: 999px;
    }

    .history-empty {
      padding: 18px;
      border-radius: 20px;
      background: var(--surface-muted);
      border: 1px dashed var(--line-strong);
      text-align: center;
      color: var(--text-sub);
      line-height: 1.7;
    }

    .history-item {
      display: grid;
      gap: 12px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid transparent;
      box-shadow: 0 12px 18px rgba(27, 48, 52, 0.06);
      transition:
        border-color var(--transition),
        transform var(--transition),
        box-shadow var(--transition);
    }

    .history-item.is-active {
      border-color: rgba(14, 124, 107, 0.4);
      box-shadow: 0 16px 24px rgba(14, 124, 107, 0.12);
    }

    .history-item:hover {
      transform: translateY(-1px);
    }

    .history-preview {
      min-height: 110px;
      border-radius: 16px;
      border: 1px solid var(--line);
      background:
        linear-gradient(45deg, rgba(0, 0, 0, 0.04) 25%, transparent 25%, transparent 75%, rgba(0, 0, 0, 0.04) 75%),
        linear-gradient(45deg, rgba(0, 0, 0, 0.04) 25%, transparent 25%, transparent 75%, rgba(0, 0, 0, 0.04) 75%),
        rgba(255, 255, 255, 0.9);
      background-position: 0 0, 8px 8px;
      background-size: 16px 16px, 16px 16px;
      display: grid;
      place-items: center;
      padding: 10px;
      overflow: hidden;
    }

    .history-preview > svg {
      max-width: 100%;
      max-height: 88px;
      display: block;
    }

    .history-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 800;
      text-align: center;
      text-wrap: pretty;
    }

    .history-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .history-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(14, 124, 107, 0.08);
      color: var(--brand-strong);
      font-size: 0.82rem;
      text-align: center;
    }

    .history-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .history-actions .danger-button {
      grid-column: 1 / -1;
    }

    .modal-layer {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(18, 31, 35, 0.38);
      backdrop-filter: blur(6px);
      z-index: 20;
    }

    .modal-layer.is-open {
      display: flex;
    }

    .modal-card {
      width: min(100%, 420px);
      display: grid;
      gap: 16px;
      padding: 24px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 252, 245, 0.98), rgba(249, 244, 234, 0.98));
      box-shadow: 0 24px 60px rgba(17, 34, 38, 0.2);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.82);
    }

    .modal-card h2 {
      margin: 0;
      font-size: 1.12rem;
      letter-spacing: 0.04em;
      text-align: center;
    }

    .modal-card p {
      margin: 0;
      color: var(--text-sub);
      line-height: 1.7;
      text-align: center;
      text-wrap: pretty;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .modal-actions.is-single {
      grid-template-columns: minmax(0, 1fr);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes rise-in {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1200px) {
      .workspace {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .history-panel {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 820px) {
      .shell {
        border-radius: 28px;
      }

      .workspace {
        grid-template-columns: minmax(0, 1fr);
      }

      .button-grid,
      .history-actions,
      .modal-actions {
        grid-template-columns: minmax(0, 1fr);
      }

      .preview-stage {
        min-height: 300px;
      }

      .editor {
        min-height: 200px;
      }

      .editor--compact {
        min-height: 110px;
      }

      .panel-head--between {
        justify-content: center;
        text-align: center;
      }

      .panel-head--between .panel-title {
        flex-basis: 100%;
      }

      .text-field-input {
        min-height: 78px;
      }
    }

    @media (pointer: coarse) {
      :root {
        --touch-target: 54px;
      }

      .panel,
      .shell {
        border-radius: 26px;
      }

      .editor {
        padding: 20px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation: none !important;
        transition: none !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="shell">
      <section class="hero" aria-label="ツール概要">
        <h1 class="hero-title">SVG = 画像</h1>
      </section>

      <section class="workspace" aria-label="SVG作業エリア">
        <article class="panel editor-panel">
          <div class="panel-head panel-head--between">
            <h2 class="panel-title">SVGコード貼り付け</h2>
            <button id="clearButton" type="button" class="subtle-button panel-action-button">クリア</button>
          </div>

          <div class="panel-section">
            <div class="editor-wrap">
              <label class="sr-only" for="svgInput">SVGコード</label>
              <div class="editor-field">
                <textarea
                  id="svgInput"
                  class="editor editor--compact"
                  spellcheck="false"
                  autocomplete="off"
                  autocapitalize="off"
                ></textarea>
                <div id="statusLine" class="status-line" aria-live="polite">入力待機中</div>
              </div>
              <div id="warningBox" class="warning-box" aria-live="polite"></div>
            </div>
          </div>

          <div class="panel-divider" role="presentation"></div>

          <div class="panel-section">
            <h3 class="panel-subtitle">表示テキスト変更</h3>
            <div id="textFieldList" class="text-field-list" aria-live="polite"></div>
          </div>
        </article>

        <article class="panel preview-panel">
          <div class="panel-head panel-head--between">
            <h2 class="panel-title">プレビューと保存</h2>
            <div id="sizeMeta" class="panel-meta-text">サイズ 未設定</div>
          </div>

          <div id="previewStage" class="preview-stage is-empty" aria-live="polite">
            プレビュー待機中
          </div>

          <div class="button-grid">
            <button id="saveImageButton" type="button" class="primary-button" disabled>画像として保存</button>
            <button id="savePdfButton" type="button" class="secondary-button" disabled>PDFとして保存</button>
          </div>
        </article>

        <article class="panel history-panel">
          <div class="panel-head">
            <h2 class="panel-title">出力履歴</h2>
          </div>

          <div class="history-tools">
            <button id="clearHistoryButton" type="button" class="danger-button">履歴をすべて削除</button>
          </div>

          <div id="historyList" class="history-list" aria-live="polite"></div>
        </article>
      </section>
    </div>
    <div class="page-footer">
      <a
        class="button-link subtle-button"
        href="https://tatsuko0429.github.io/my-homepage/"
        target="_blank"
        rel="noopener noreferrer"
      >開発者について</a>
    </div>
  </main>

  <div id="modalLayer" class="modal-layer" role="presentation">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalMessage">
      <h2 id="modalTitle">確認</h2>
      <p id="modalMessage">内容を確認してください。</p>
      <div class="modal-actions">
        <button id="modalCancelButton" type="button" class="subtle-button">閉じる</button>
        <button id="modalConfirmButton" type="button" class="primary-button">OK</button>
      </div>
    </div>
  </div>

  <script>
    (() => {
      const HISTORY_SCHEMA_VERSION = 2;
      const MAX_HISTORY_ITEMS = 50;
      const STORAGE_KEY = "svg-export-history-fallback";
      const PREVIEW_DEBOUNCE_MS = 320;
      const TEXT_EDIT_DEBOUNCE_MS = 120;
      const textEncoder = new TextEncoder();
      const historyPreviewCache = new Map();

      const state = {
        currentDocument: null,
        historyItems: [],
        selectedHistoryId: null,
        focusedTextId: null,
        previewTimer: 0,
        textEditTimer: 0,
        isBusy: false,
        statusIsError: false
      };

      const dom = {
        svgInput: document.getElementById("svgInput"),
        clearButton: document.getElementById("clearButton"),
        saveImageButton: document.getElementById("saveImageButton"),
        savePdfButton: document.getElementById("savePdfButton"),
        clearHistoryButton: document.getElementById("clearHistoryButton"),
        previewStage: document.getElementById("previewStage"),
        statusLine: document.getElementById("statusLine"),
        warningBox: document.getElementById("warningBox"),
        sizeMeta: document.getElementById("sizeMeta"),
        textFieldList: document.getElementById("textFieldList"),
        historyList: document.getElementById("historyList"),
        modalLayer: document.getElementById("modalLayer"),
        modalTitle: document.getElementById("modalTitle"),

      };

      const HapticService = (() => {
        const tapPattern = 12;

        function canVibrate() {
          return typeof navigator.vibrate === "function";
        }

        function isTouchLikeEvent(event) {
          if (event.type === "touchstart") return true;
          return event.pointerType === "touch";
        }

        function findInteractiveControl(target) {
          if (!(target instanceof Element)) return null;
          return target.closest("button, .button-link, [role='button']");
        }

        function isDisabled(control) {
          return control.matches("button:disabled, [aria-disabled='true']");
        }

        function pulse() {
          if (!canVibrate()) return;
          try {
            navigator.vibrate(tapPattern);
          } catch (error) {
            console.debug("Haptic feedback is not available.", error);
          }
        }

        function bind() {
          const eventName = "PointerEvent" in window ? "pointerdown" : "touchstart";
          document.addEventListener(eventName, (event) => {
            if (!isTouchLikeEvent(event)) return;
            const control = findInteractiveControl(event.target);
            if (!control || isDisabled(control)) return;
            pulse();
          }, { passive: true });
        }

        return { bind };
      })();

      const DialogService = (() => {
        let resolver = null;
        let lastFocusedElement = null;

        function getFocusableElements() {
          return [...dom.modalLayer.querySelectorAll("button, [href], input, select, textarea, [tabindex]:not([tabindex='-1'])")]
            .filter((element) => !element.hasAttribute("disabled") && !element.getAttribute("aria-hidden") && !element.hidden);
        }

        function close(result) {
          dom.modalLayer.classList.remove("is-open");
          if (resolver) {
            const currentResolver = resolver;
            resolver = null;
            currentResolver(result);
          }
          if (lastFocusedElement && lastFocusedElement.isConnected) {
            lastFocusedElement.focus();
          }
          lastFocusedElement = null;
        }

        dom.modalCancelButton.addEventListener("click", () => close(false));
        dom.modalConfirmButton.addEventListener("click", () => close(true));
        dom.modalLayer.addEventListener("click", (event) => {
          if (event.target === dom.modalLayer) {
            close(false);
          }
        });
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && dom.modalLayer.classList.contains("is-open")) {
            close(false);
            return;
          }
          if (event.key === "Tab" && dom.modalLayer.classList.contains("is-open")) {
            const focusableElements = getFocusableElements();
            if (!focusableElements.length) return;
            const firstElement = focusableElements[0];
            const lastElement = focusableElements[focusableElements.length - 1];
            const activeElement = document.activeElement;
            if (event.shiftKey && activeElement === firstElement) {
              event.preventDefault();
              lastElement.focus();
            } else if (!event.shiftKey && activeElement === lastElement) {
              event.preventDefault();
              firstElement.focus();
            }
          }
        });

        async function open(options) {
          lastFocusedElement = document.activeElement instanceof HTMLElement ? document.activeElement : null;
          dom.modalTitle.textContent = options.title;
          dom.modalMessage.textContent = options.message;
          dom.modalCancelButton.textContent = options.cancelText || "閉じる";
          dom.modalCancelButton.hidden = !options.showCancel;
          dom.modalActions.classList.toggle("is-single", !options.showCancel);
          dom.modalConfirmButton.textContent = options.confirmText || "OK";
          dom.modalConfirmButton.className = options.danger ? "danger-button" : (options.confirmClass || "primary-button");
          dom.modalLayer.classList.add("is-open");
          const preferredFocus = options.showCancel ? dom.modalCancelButton : dom.modalConfirmButton;
          preferredFocus.focus();
          return new Promise((resolve) => {
            resolver = resolve;
          });
        }

        async function notice(title, message, confirmText = "閉じる") {
          await open({
            title,
            message,
            confirmText,
            showCancel: false
          });
        }

        async function confirm(title, message, options = {}) {
          return open({
            title,
            message,
            confirmText: options.confirmText || "OK",
            cancelText: options.cancelText || "キャンセル",
            showCancel: true,
            danger: !!options.danger,
            confirmClass: options.confirmClass
          });
        }

        return {
          notice,
          confirm
        };
      })();

      const StorageService = (() => {
        let backendPromise = null;

        function requestToPromise(request) {
          return new Promise((resolve, reject) => {
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error || new Error("保存処理に失敗しました。"));
          });
        }

        function createLocalBackend() {
          function readAll() {
            try {
              const raw = localStorage.getItem(STORAGE_KEY);
              const items = raw ? JSON.parse(raw) : [];
              return Array.isArray(items) ? items : [];
            } catch (error) {
              console.error(error);
              return [];
            }
          }

          function writeAll(items) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
          }

          return {
            async getAll() {
              return readAll().sort((a, b) => b.updatedAt - a.updatedAt);
            },
            async get(id) {
              return readAll().find((item) => item.id === id) || null;
            },
            async put(record) {
              const items = readAll();
              const index = items.findIndex((item) => item.id === record.id);
              if (index >= 0) {
                items[index] = record;
              } else {
                items.push(record);
              }
              items.sort((a, b) => b.updatedAt - a.updatedAt);
              writeAll(items.slice(0, MAX_HISTORY_ITEMS));
            },
            async remove(id) {
              const items = readAll().filter((item) => item.id !== id);
              writeAll(items);
            },
            async clear() {
              localStorage.removeItem(STORAGE_KEY);
            }
          };
        }

        async function createIndexedDbBackend() {
          if (!("indexedDB" in window)) {
            throw new Error("IndexedDB は利用できません。");
          }

          const db = await new Promise((resolve, reject) => {
            const request = indexedDB.open("svg-export-history-db", 1);
            request.onupgradeneeded = () => {
              const database = request.result;
              if (!database.objectStoreNames.contains("history")) {
                const store = database.createObjectStore("history", { keyPath: "id" });
                store.createIndex("updatedAt", "updatedAt");
              }
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error || new Error("IndexedDB の初期化に失敗しました。"));
          });

          function withStore(mode, runner) {
            return new Promise((resolve, reject) => {
              const transaction = db.transaction("history", mode);
              const store = transaction.objectStore("history");
              const result = runner(store, transaction);
              transaction.oncomplete = () => resolve(result);
              transaction.onerror = () => reject(transaction.error || new Error("履歴保存に失敗しました。"));
              transaction.onabort = () => reject(transaction.error || new Error("履歴保存が中断されました。"));
            });
          }

          return {
            async getAll() {
              const items = await requestToPromise(db.transaction("history", "readonly").objectStore("history").getAll());
              return items.sort((a, b) => b.updatedAt - a.updatedAt);
            },
            async get(id) {
              return requestToPromise(db.transaction("history", "readonly").objectStore("history").get(id));
            },
            async put(record) {
              await withStore("readwrite", (store) => {
                store.put(record);
              });
              const items = await this.getAll();
              if (items.length > MAX_HISTORY_ITEMS) {
                await withStore("readwrite", (store) => {
                  items.slice(MAX_HISTORY_ITEMS).forEach((item) => {
                    store.delete(item.id);
                  });
                });
              }
            },
            async remove(id) {
              await withStore("readwrite", (store) => {
                store.delete(id);
              });
            },
            async clear() {
              await withStore("readwrite", (store) => {
                store.clear();
              });
            }
          };
        }

        async function getBackend() {
          if (!backendPromise) {
            backendPromise = createIndexedDbBackend().catch((error) => {
              console.warn(error);
              return createLocalBackend();
            });
          }
          return backendPromise;
        }

        return {
          async init() {
            await getBackend();
          },
          async getAll() {
            const backend = await getBackend();
            return backend.getAll();
          },
          async get(id) {
            const backend = await getBackend();
            return backend.get(id);
          },
          async put(record) {
            const backend = await getBackend();
            return backend.put(record);
          },
          async remove(id) {
            const backend = await getBackend();
            return backend.remove(id);
          },
          async clear() {
            const backend = await getBackend();
            return backend.clear();
          }
        };
      })();

      const SvgService = (() => {
        const blockedTags = new Set([
          "script",
          "foreignObject",
          "iframe",
          "object",
          "embed",
          "audio",
          "video",
          "canvas",
          "form",
          "input",
          "textarea",
          "button"
        ]);
        const editableTextParentTags = new Set(["text", "tspan", "textpath"]);
        const nonVisibleTextAncestors = new Set([
          "title",
          "desc",
          "style",
          "script",
          "metadata",
          "clipPath",
          "mask",
          "marker",
          "pattern",
          "linearGradient",
          "radialGradient",
          "filter"
        ]);

        function parseLengthToPx(value) {
          if (!value) return null;
          const match = String(value).trim().match(/^([-+]?\d*\.?\d+)(px|pt|pc|mm|cm|in|q)?$/i);
          if (!match) return null;
          const amount = Number(match[1]);
          const unit = (match[2] || "px").toLowerCase();
          if (!Number.isFinite(amount) || amount <= 0) return null;
          switch (unit) {
            case "px":
              return amount;
            case "pt":
              return amount * (96 / 72);
            case "pc":
              return amount * 16;
            case "mm":
              return amount * (96 / 25.4);
            case "cm":
              return amount * (96 / 2.54);
            case "in":
              return amount * 96;
            case "q":
              return amount * (96 / 101.6);
            default:
              return null;
          }
        }

        function parseViewBox(viewBoxValue) {
          if (!viewBoxValue) return null;
          const values = String(viewBoxValue)
            .trim()
            .split(/[\s,]+/)
            .map((value) => Number(value));
          if (values.length !== 4 || values.some((value) => !Number.isFinite(value))) {
            return null;
          }
          const [, , width, height] = values;
          if (width <= 0 || height <= 0) {
            return null;
          }
          return { width, height };
        }

        function sanitizeStyleAttribute(value, warnings) {
          if (!value) return "";
          const safeRules = [];
          String(value)
            .split(";")
            .forEach((rule) => {
              const trimmedRule = rule.trim();
              if (!trimmedRule) return;
              const lowerRule = trimmedRule.toLowerCase();
              if (lowerRule.includes("javascript:")) {
                warnings.add("危険なスタイル指定を除外しました。");
                return;
              }
              if (lowerRule.includes("url(") && !/url\(\s*['"]?#/i.test(lowerRule) && !/url\(\s*['"]?data:/i.test(lowerRule)) {
                warnings.add("外部参照を含むスタイル指定を除外しました。");
                return;
              }
              safeRules.push(trimmedRule);
            });
          return safeRules.join("; ");
        }

        function sanitizeStyleTag(textContent, warnings) {
          if (!textContent) return "";
          let safeCss = String(textContent).replace(/@import[^;]+;/gi, "");
          if (safeCss !== textContent) {
            warnings.add("外部CSSの読み込み指定を除外しました。");
          }
          safeCss = safeCss.replace(/url\(\s*(['"]?)(https?:|javascript:)[^)]+\)/gi, "");
          return safeCss;
        }

        function sanitizeSvgElement(root) {
          const warnings = new Set();
          const sanitizedRoot = root.cloneNode(true);
          const allElements = [sanitizedRoot, ...sanitizedRoot.querySelectorAll("*")];

          allElements.forEach((element) => {
            const tagName = element.tagName ? element.tagName.toLowerCase() : "";
            if (blockedTags.has(tagName)) {
              warnings.add("一部の埋め込み要素は安全のため除外しました。");
              element.remove();
              return;
            }

            [...element.attributes].forEach((attribute) => {
              const name = attribute.name;
              const lowerName = name.toLowerCase();
              const value = attribute.value;
              const lowerValue = String(value).toLowerCase();

              if (lowerName.startsWith("on")) {
                element.removeAttribute(name);
                warnings.add("イベント属性は安全のため除外しました。");
                return;
              }

              if (lowerName === "style") {
                const sanitizedStyle = sanitizeStyleAttribute(value, warnings);
                if (sanitizedStyle) {
                  element.setAttribute(name, sanitizedStyle);
                } else {
                  element.removeAttribute(name);
                }
                return;
              }

              if (lowerName === "href" || lowerName === "xlink:href" || lowerName === "src") {
                const safeReference = value.trim();
                if (!safeReference.startsWith("#") && !safeReference.startsWith("data:")) {
                  element.removeAttribute(name);
                  warnings.add("外部参照はプレビューと出力の安定性のため除外しました。");
                }
                return;
              }

              if (lowerValue.includes("javascript:")) {
                element.removeAttribute(name);
                warnings.add("危険な属性値を除外しました。");
                return;
              }
            });

            if (tagName === "style") {
              element.textContent = sanitizeStyleTag(element.textContent, warnings);
            }
          });

          sanitizedRoot.setAttribute("xmlns", "http://www.w3.org/2000/svg");
          sanitizedRoot.setAttribute("xmlns:xlink", "http://www.w3.org/1999/xlink");
          return { sanitizedRoot, warnings: [...warnings] };
        }

        function getDimensions(svgElement) {
          const widthFromAttribute = parseLengthToPx(svgElement.getAttribute("width"));
          const heightFromAttribute = parseLengthToPx(svgElement.getAttribute("height"));
          const viewBox = parseViewBox(svgElement.getAttribute("viewBox"));

          if (widthFromAttribute && heightFromAttribute) {
            return { width: widthFromAttribute, height: heightFromAttribute };
          }

          if (viewBox && widthFromAttribute) {
            return { width: widthFromAttribute, height: widthFromAttribute * (viewBox.height / viewBox.width) };
          }

          if (viewBox && heightFromAttribute) {
            return { width: heightFromAttribute * (viewBox.width / viewBox.height), height: heightFromAttribute };
          }

          if (viewBox) {
            return { width: viewBox.width, height: viewBox.height };
          }

          return { width: 800, height: 600 };
        }

        function createExportString(svgElement, dimensions) {
          const exportRoot = svgElement.cloneNode(true);
          exportRoot.setAttribute("width", String(Math.round(dimensions.width)));
          exportRoot.setAttribute("height", String(Math.round(dimensions.height)));
          if (!exportRoot.getAttribute("viewBox")) {
            exportRoot.setAttribute("viewBox", "0 0 " + Math.round(dimensions.width) + " " + Math.round(dimensions.height));
          }
          return new XMLSerializer().serializeToString(exportRoot);
        }

        function extractLabel(svgElement, dimensions, textItems) {
          const titleNode = svgElement.querySelector("title");
          const idValue = svgElement.getAttribute("id");
          const candidate = titleNode && titleNode.textContent ? titleNode.textContent.trim() : (idValue ? idValue.trim() : "");
          if (candidate) {
            return candidate.slice(0, 36);
          }
          const visibleText = Array.isArray(textItems)
            ? textItems.map((item) => item.value.trim()).find((value) => value)
            : "";
          if (visibleText) {
            return visibleText.slice(0, 36);
          }
          return Math.round(dimensions.width) + "×" + Math.round(dimensions.height) + " SVG";
        }

        function formatPositionValue(value) {
          if (value == null || value === "") return "";
          return String(value).trim().replace(/\s+/g, " ");
        }

        function getChildNodeIndex(node) {
          const parent = node.parentNode;
          if (!parent) return -1;
          for (let index = 0; index < parent.childNodes.length; index += 1) {
            if (parent.childNodes[index] === node) {
              return index;
            }
          }
          return -1;
        }

        function createNodePath(node, root) {
          const path = [];
          let current = node;
          while (current && current !== root) {
            const index = getChildNodeIndex(current);
            if (index < 0) {
              return "";
            }
            path.unshift(index);
            current = current.parentNode;
          }
          return path.join(".");
        }

        function findNodeByPath(root, path) {
          if (!path) return null;
          let current = root;
          const indexes = path.split(".").map((value) => Number(value));
          for (const index of indexes) {
            if (!current || !current.childNodes || !Number.isInteger(index) || index < 0 || index >= current.childNodes.length) {
              return null;
            }
            current = current.childNodes[index];
          }
          return current;
        }

        function hasNonVisibleAncestor(node, root) {
          let current = node.parentElement;
          while (current && current !== root) {
            const tagName = current.tagName ? current.tagName.toLowerCase() : "";
            if (nonVisibleTextAncestors.has(tagName)) {
              return true;
            }
            current = current.parentElement;
          }
          return false;
        }

        function getNearestElementWithId(element, root) {
          let current = element;
          while (current && current !== root) {
            if (current.id) {
              return current;
            }
            current = current.parentElement;
          }
          return root.id ? root : null;
        }

        function getPositionSourceElement(element, root) {
          let current = element;
          while (current && current !== root) {
            if (current.hasAttribute("x") || current.hasAttribute("y") || current.hasAttribute("dx") || current.hasAttribute("dy")) {
              return current;
            }
            current = current.parentElement;
          }
          return null;
        }

        function createContextChips(element, root) {
          const chips = ["要素 " + element.tagName.toLowerCase()];
          const identifiedElement = getNearestElementWithId(element, root);
          if (identifiedElement) {
            chips.push("ID " + identifiedElement.id);
          }
          const positionedElement = getPositionSourceElement(element, root);
          if (positionedElement) {
            const x = formatPositionValue(positionedElement.getAttribute("x"));
            const y = formatPositionValue(positionedElement.getAttribute("y"));
            const dx = formatPositionValue(positionedElement.getAttribute("dx"));
            const dy = formatPositionValue(positionedElement.getAttribute("dy"));
            const parts = [
              x ? "x:" + x : "",
              y ? "y:" + y : "",
              dx ? "dx:" + dx : "",
              dy ? "dy:" + dy : ""
            ].filter(Boolean);
            if (parts.length) {
              chips.push(parts.join(" / "));
            }
          }
          return chips;
        }

        // 同一文字列が複数あっても個別編集できるよう、文字列置換ではなくノード位置で追跡する。
        function extractEditableTextItems(svgRoot) {
          const walker = document.createTreeWalker(svgRoot, NodeFilter.SHOW_TEXT);
          const items = [];
          let textNode = walker.nextNode();
          let counter = 1;

          while (textNode) {
            const rawValue = textNode.nodeValue || "";
            const parent = textNode.parentElement;
            const parentTag = parent && parent.tagName ? parent.tagName.toLowerCase() : "";

            if (
              parent &&
              editableTextParentTags.has(parentTag) &&
              rawValue.trim() &&
              !hasNonVisibleAncestor(textNode, svgRoot)
            ) {
              items.push({
                id: "text-" + counter,
                nodePath: createNodePath(textNode, svgRoot),
                elementPath: createNodePath(parent, svgRoot),
                value: rawValue,
                label: "表示テキスト " + counter,
                contextChips: createContextChips(parent, svgRoot)
              });
              counter += 1;
            }

            textNode = walker.nextNode();
          }

          return items;
        }

        function compose(definition, options = {}) {
          const parser = new DOMParser();
          const documentNode = parser.parseFromString(definition.sourceSvgString, "image/svg+xml");
          const root = documentNode.documentElement;

          definition.textItems.forEach((item) => {
            const targetNode = findNodeByPath(root, item.nodePath);
            if (targetNode && targetNode.nodeType === Node.TEXT_NODE) {
              targetNode.nodeValue = item.value;
            }
            const targetElement = findNodeByPath(root, item.elementPath);
            if (targetElement && targetElement.nodeType === Node.ELEMENT_NODE) {
              targetElement.setAttribute("data-edit-id", item.id);
              if (options.focusedTextId === item.id) {
                targetElement.setAttribute("data-edit-highlight", "true");
              }
            }
          });

          return {
            previewNode: root.cloneNode(true),
            exportSvgString: createExportString(root, definition.dimensions),
            label: extractLabel(root, definition.dimensions, definition.textItems),
            dimensions: definition.dimensions
          };
        }

        function parse(input) {
          if (!input.trim()) {
            return {
              ok: false,
              message: "SVGコードを貼り付けてください。"
            };
          }

          const parser = new DOMParser();
          const documentNode = parser.parseFromString(input, "image/svg+xml");
          if (documentNode.querySelector("parsererror")) {
            return {
              ok: false,
              message: "SVGの形式を確認してください。"
            };
          }

          const root = documentNode.documentElement;
          if (!root || root.tagName.toLowerCase() !== "svg") {
            return {
              ok: false,
              message: "最上位要素が svg のコードを貼り付けてください。"
            };
          }

          const { sanitizedRoot, warnings } = sanitizeSvgElement(root);
          const dimensions = getDimensions(sanitizedRoot);
          const textItems = extractEditableTextItems(sanitizedRoot);
          const sourceSvgString = createExportString(sanitizedRoot, dimensions);
          const definition = {
            sourceSvgString,
            dimensions,
            warnings,
            textItems
          };
          const rendered = compose(definition);

          return {
            ok: true,
            definition,
            rendered
          };
        }

        return {
          parse,
          compose
        };
      })();

      const ExportService = (() => {
        function filenameStamp() {
          const now = new Date();
          const parts = [
            now.getFullYear(),
            String(now.getMonth() + 1).padStart(2, "0"),
            String(now.getDate()).padStart(2, "0"),
            "-",
            String(now.getHours()).padStart(2, "0"),
            String(now.getMinutes()).padStart(2, "0"),
            String(now.getSeconds()).padStart(2, "0")
          ];
          return parts.join("");
        }

        function buildFilename(extension) {
          return "svg-export-" + filenameStamp() + "." + extension;
        }

        function sanitizeFilenameStem(value) {
          const safe = String(value || "")
            .trim()
            .replace(/[\\/:*?"<>|]+/g, "-")
            .replace(/\s+/g, "-")
            .replace(/-+/g, "-")
            .replace(/^-|-$/g, "");
          return safe || "svg-code";
        }

        function buildHistoryTextFilename(label) {
          return sanitizeFilenameStem(label) + "-" + filenameStamp() + ".txt";
        }

        function downloadBlob(blob, fileName) {
          const url = URL.createObjectURL(blob);
          const link = document.createElement("a");
          link.href = url;
          link.download = fileName;
          document.body.append(link);
          link.click();
          link.remove();
          window.setTimeout(() => URL.revokeObjectURL(url), 1000);
        }

        function loadImage(url) {
          return new Promise((resolve, reject) => {
            const image = new Image();
            image.onload = () => resolve(image);
            image.onerror = () => reject(new Error("SVGの画像化に失敗しました。"));
            image.decoding = "async";
            image.src = url;
          });
        }

        async function renderCanvas(svgString, dimensions, options = {}) {
          const blob = new Blob([svgString], { type: "image/svg+xml;charset=utf-8" });
          const objectUrl = URL.createObjectURL(blob);
          try {
            const image = await loadImage(objectUrl);
            const longEdge = Math.max(dimensions.width, dimensions.height);
            const preferredScale = longEdge <= 900 ? 2.4 : longEdge <= 1600 ? 1.8 : 1.2;
            const scaleLimit = 2400 / longEdge;
            const scale = Math.max(0.35, Math.min(preferredScale, scaleLimit || preferredScale));
            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.round(dimensions.width * scale));
            canvas.height = Math.max(1, Math.round(dimensions.height * scale));
            const context = canvas.getContext("2d", { alpha: options.background !== "white" });
            if (!context) {
              throw new Error("描画用のキャンバスを作成できませんでした。");
            }
            if (options.background === "white") {
              context.fillStyle = "#ffffff";
              context.fillRect(0, 0, canvas.width, canvas.height);
            }
            context.drawImage(image, 0, 0, canvas.width, canvas.height);
            return canvas;
          } finally {
            URL.revokeObjectURL(objectUrl);
          }
        }

        function canvasToBlob(canvas, type, quality) {
          return new Promise((resolve, reject) => {
            canvas.toBlob((blob) => {
              if (blob) {
                resolve(blob);
                return;
              }
              reject(new Error("ファイルの生成に失敗しました。"));
            }, type, quality);
          });
        }

        function formatNumber(value) {
          return Number(value.toFixed(3)).toString();
        }

        function concatUint8Arrays(chunks) {
          const totalLength = chunks.reduce((sum, chunk) => sum + chunk.length, 0);
          const merged = new Uint8Array(totalLength);
          let offset = 0;
          chunks.forEach((chunk) => {
            merged.set(chunk, offset);
            offset += chunk.length;
          });
          return merged;
        }

        function toAsciiBytes(text) {
          return textEncoder.encode(text);
        }

        // 最小構成のPDFを組み立てて JPEG 画像を1ページに配置する。
        function buildPdfBlob(jpegBytes, imageWidthPx, imageHeightPx, pageWidthPx, pageHeightPx) {
          const pageLimit = 14400;
          let pageWidth = pageWidthPx * 0.75;
          let pageHeight = pageHeightPx * 0.75;
          const limitScale = Math.min(1, pageLimit / Math.max(pageWidth, pageHeight));
          pageWidth *= limitScale;
          pageHeight *= limitScale;

          const header = new Uint8Array([37, 80, 68, 70, 45, 49, 46, 52, 10, 37, 226, 227, 207, 211, 10]);
          const contentStream = "q\n" +
            formatNumber(pageWidth) + " 0 0 " + formatNumber(pageHeight) + " 0 0 cm\n" +
            "/Im0 Do\nQ";

          const objects = [
            toAsciiBytes("1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n"),
            toAsciiBytes("2 0 obj\n<< /Type /Pages /Count 1 /Kids [3 0 R] >>\nendobj\n"),
            toAsciiBytes(
              "3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 " +
              formatNumber(pageWidth) + " " + formatNumber(pageHeight) +
              "] /Resources << /ProcSet [/PDF /ImageC] /XObject << /Im0 4 0 R >> >> /Contents 5 0 R >>\nendobj\n"
            ),
            concatUint8Arrays([
              toAsciiBytes(
                "4 0 obj\n<< /Type /XObject /Subtype /Image /Width " +
                Math.round(imageWidthPx) +
                " /Height " +
                Math.round(imageHeightPx) +
                " /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length " +
                jpegBytes.length +
                " >>\nstream\n"
              ),
              jpegBytes,
              toAsciiBytes("\nendstream\nendobj\n")
            ]),
            toAsciiBytes("5 0 obj\n<< /Length " + contentStream.length + " >>\nstream\n" + contentStream + "\nendstream\nendobj\n")
          ];

          const chunks = [header];
          const offsets = [0];
          let currentOffset = header.length;
          objects.forEach((objectBytes) => {
            offsets.push(currentOffset);
            chunks.push(objectBytes);
            currentOffset += objectBytes.length;
          });

          const xrefOffset = currentOffset;
          const xrefLines = ["xref", "0 6", "0000000000 65535 f "];
          for (let index = 1; index <= 5; index += 1) {
            xrefLines.push(String(offsets[index]).padStart(10, "0") + " 00000 n ");
          }
          const trailer = [
            xrefLines.join("\n"),
            "trailer",
            "<< /Size 6 /Root 1 0 R >>",
            "startxref",
            String(xrefOffset),
            "%%EOF"
          ].join("\n");

          chunks.push(toAsciiBytes(trailer));
          return new Blob([concatUint8Arrays(chunks)], { type: "application/pdf" });
        }

        async function saveAsPng(svgDocument) {
          const canvas = await renderCanvas(svgDocument.exportSvgString, svgDocument.dimensions);
          const pngBlob = await canvasToBlob(canvas, "image/png");
          downloadBlob(pngBlob, buildFilename("png"));
        }

        async function saveAsPdf(svgDocument) {
          const canvas = await renderCanvas(svgDocument.exportSvgString, svgDocument.dimensions, { background: "white" });
          const jpegBlob = await canvasToBlob(canvas, "image/jpeg", 0.92);
          const jpegBytes = new Uint8Array(await jpegBlob.arrayBuffer());
          const pdfBlob = buildPdfBlob(
            jpegBytes,
            canvas.width,
            canvas.height,
            svgDocument.dimensions.width,
            svgDocument.dimensions.height
          );
          downloadBlob(pdfBlob, buildFilename("pdf"));
        }

        function saveTextFile(content, fileName = buildHistoryTextFilename()) {
          const textBlob = new Blob([content], { type: "text/plain;charset=utf-8" });
          downloadBlob(textBlob, fileName);
        }

        return {
          saveAsPng,
          saveAsPdf,
          saveTextFile,
          buildHistoryTextFilename
        };
      })();

      function setStatus(message, isError = false) {
        state.statusIsError = isError;
        dom.statusLine.textContent = message;
        dom.statusLine.classList.toggle("is-error", isError);
        updateStatusLineVisibility();
      }

      function updateStatusLineVisibility() {
        const hasInput = !!dom.svgInput.value.trim();
        const shouldShow = !hasInput || state.statusIsError;
        dom.statusLine.classList.toggle("is-hidden", !shouldShow);
      }

      function setWarnings(warnings) {
        if (!warnings || !warnings.length) {
          dom.warningBox.classList.remove("is-visible");
          dom.warningBox.textContent = "";
          return;
        }
        dom.warningBox.classList.add("is-visible");
        dom.warningBox.textContent = warnings.join(" / ");
      }

      function setSvgInputLock(isLocked) {
        dom.svgInput.readOnly = isLocked;
        updateStatusLineVisibility();
      }

      function updateActionButtons() {
        const isReady = !!state.currentDocument && !state.isBusy;
        const hasInput = !!dom.svgInput.value.trim();
        dom.saveImageButton.disabled = !isReady;
        dom.savePdfButton.disabled = !isReady;
        dom.clearButton.disabled = state.isBusy || !hasInput;
        dom.clearHistoryButton.disabled = state.isBusy || state.historyItems.length === 0;
      }

      function clearPreview() {
        dom.previewStage.classList.add("is-empty");
        dom.previewStage.textContent = "プレビュー待機中";
        dom.sizeMeta.textContent = "サイズ 未設定";
        setWarnings([]);
      }

      function renderPreview(documentState) {
        dom.previewStage.classList.remove("is-empty");
        dom.previewStage.replaceChildren(documentState.rendered.previewNode);
        dom.sizeMeta.textContent = "サイズ " + Math.round(documentState.definition.dimensions.width) + " × " + Math.round(documentState.definition.dimensions.height);
        setWarnings(documentState.definition.warnings);
      }

      function normalizeBulkEditorValue(value) {
        return String(value).replace(/\r\n/g, "\n").replace(/\n+/g, " ").trim();
      }

      function serializeBulkTextItems(textItems) {
        return textItems.map((item) => normalizeBulkEditorValue(item.value)).join("\n");
      }

      function updateFocusedTextCards() {
        [...dom.textFieldList.querySelectorAll(".text-field-card")].forEach((card) => {
          card.classList.toggle("is-focused", card.dataset.textId === state.focusedTextId);
        });
      }

      function renderTextFieldList() {
        dom.textFieldList.replaceChildren();

        const empty = document.createElement("div");
        empty.className = "text-field-empty";

        if (!state.currentDocument) {
          empty.textContent = "表示テキスト待機中";
          dom.textFieldList.append(empty);
          return;
        }

        if (!state.currentDocument.definition.textItems.length) {
          empty.textContent = "編集できる表示テキストはありません";
          dom.textFieldList.append(empty);
          return;
        }

        const input = document.createElement("textarea");
        input.id = "bulkTextInput";
        input.className = "text-field-input text-bulk-input";
        input.rows = Math.min(Math.max(state.currentDocument.definition.textItems.length, 4), 12);
        input.value = serializeBulkTextItems(state.currentDocument.definition.textItems);
        input.dataset.editorMode = "bulk";
        input.setAttribute("aria-label", "表示テキスト変更");
        dom.textFieldList.append(input);
      }

      function resetLoadedDocumentState() {
        window.clearTimeout(state.textEditTimer);
        state.currentDocument = null;
        state.focusedTextId = null;
        setSvgInputLock(false);
        clearPreview();
        renderTextFieldList();
        updateActionButtons();
      }

      function composeCurrentDocument(options = {}) {
        if (!state.currentDocument) {
          return false;
        }

        try {
          const rendered = SvgService.compose(state.currentDocument.definition, {
            focusedTextId: state.focusedTextId
          });
          state.currentDocument.rendered = rendered;
          renderPreview(state.currentDocument);
          if (options.syncCodeInput !== false) {
            dom.svgInput.value = rendered.exportSvgString;
          }
          return true;
        } catch (error) {
          console.error(error);
          clearPreview();
          setStatus("表示テキストの反映に失敗しました。", true);
          return false;
        } finally {
          updateActionButtons();
        }
      }

      function scheduleTextSync() {
        window.clearTimeout(state.textEditTimer);
        state.textEditTimer = window.setTimeout(() => {
          if (composeCurrentDocument()) {
            setStatus("表示テキストを更新しました。");
          }
        }, TEXT_EDIT_DEBOUNCE_MS);
      }

      function updateTextItemValue(id, value) {
        if (!state.currentDocument) return;
        const item = state.currentDocument.definition.textItems.find((entry) => entry.id === id);
        if (!item) return;
        item.value = value;
        if (state.selectedHistoryId) {
          state.selectedHistoryId = null;
          renderHistoryList();
        }
        scheduleTextSync();
      }

      function updateBulkTextValue(value) {
        if (!state.currentDocument) return;
        const lines = String(value).replace(/\r\n/g, "\n").split("\n");
        if (lines.length !== state.currentDocument.definition.textItems.length) {
          setStatus("改行数が変わるため反映できません。", true);
          return;
        }
        state.currentDocument.definition.textItems.forEach((item, index) => {
          item.value = lines[index];
        });
        if (state.selectedHistoryId) {
          state.selectedHistoryId = null;
          renderHistoryList();
        }
        scheduleTextSync();
      }

      function setFocusedTextId(id) {
        const nextId = id || null;
        if (state.focusedTextId === nextId) return;
        state.focusedTextId = nextId;
        updateFocusedTextCards();
        if (state.currentDocument) {
          composeCurrentDocument({ syncCodeInput: false });
        }
      }

      function normalizeHistoryRecord(record) {
        return {
          id: record.id,
          label: record.label || "SVG",
          svg: record.svg || "",
          width: Number(record.width) || 0,
          height: Number(record.height) || 0,
          createdAt: Number(record.createdAt) || Date.now(),
          updatedAt: Number(record.updatedAt) || Date.now(),
          exportFormats: Array.isArray(record.exportFormats) ? record.exportFormats : [],
          textItemCount: Number.isInteger(record.textItemCount) ? record.textItemCount : null,
          schemaVersion: Number.isInteger(record.schemaVersion) ? record.schemaVersion : 1
        };
      }

      function createHistoryPreview(item) {
        const cached = historyPreviewCache.get(item.id);
        if (cached && cached.svg === item.svg) {
          return cached.node.cloneNode(true);
        }

        const parsed = SvgService.parse(item.svg);
        if (!parsed.ok) {
          const fallback = document.createElement("div");
          fallback.textContent = "表示できません";
          return fallback;
        }

        const cachedNode = parsed.rendered.previewNode.cloneNode(true);
        historyPreviewCache.set(item.id, {
          svg: item.svg,
          node: cachedNode
        });
        return cachedNode.cloneNode(true);
      }

      function pruneHistoryPreviewCache(items) {
        const activeIds = new Set(items.map((item) => item.id));
        [...historyPreviewCache.keys()].forEach((key) => {
          if (!activeIds.has(key)) {
            historyPreviewCache.delete(key);
          }
        });
      }

      function formatDateTime(timestamp) {
        return new Intl.DateTimeFormat("ja-JP", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        }).format(new Date(timestamp));
      }

      function renderHistoryList() {
        dom.historyList.replaceChildren();

        if (!state.historyItems.length) {
          const empty = document.createElement("div");
          empty.className = "history-empty";
          empty.textContent = "まだ履歴はありません";
          dom.historyList.append(empty);
          updateActionButtons();
          return;
        }

        state.historyItems.forEach((item) => {
          const card = document.createElement("article");
          card.className = "history-item" + (state.selectedHistoryId === item.id ? " is-active" : "");

          const preview = document.createElement("div");
          preview.className = "history-preview";
          preview.append(createHistoryPreview(item));

          const title = document.createElement("h3");
          title.className = "history-title";
          title.textContent = item.label;

          const meta = document.createElement("div");
          meta.className = "history-meta";

          const dateChip = document.createElement("span");
          dateChip.className = "history-chip";
          dateChip.textContent = formatDateTime(item.updatedAt);

          const sizeChip = document.createElement("span");
          sizeChip.className = "history-chip";
          sizeChip.textContent = Math.round(item.width) + " × " + Math.round(item.height);

          const formatText = (item.exportFormats || []).join(" / ");
          meta.append(dateChip, sizeChip);
          if (formatText) {
            const formatChip = document.createElement("span");
            formatChip.className = "history-chip";
            formatChip.textContent = formatText;
            meta.append(formatChip);
          }

          if (item.textItemCount != null) {
            const textCountChip = document.createElement("span");
            textCountChip.className = "history-chip";
            textCountChip.textContent = "テキスト " + item.textItemCount + " 件";
            meta.append(textCountChip);
          }

          const actions = document.createElement("div");
          actions.className = "history-actions";

          const loadButton = document.createElement("button");
          loadButton.type = "button";
          loadButton.className = "primary-button";
          loadButton.textContent = "この内容を読み込む";
          loadButton.dataset.action = "load";
          loadButton.dataset.id = item.id;

          const textButton = document.createElement("button");
          textButton.type = "button";
          textButton.className = "subtle-button";
          textButton.textContent = "TXT保存";
          textButton.dataset.action = "download-text";
          textButton.dataset.id = item.id;

          const deleteButton = document.createElement("button");
          deleteButton.type = "button";
          deleteButton.className = "danger-button";
          deleteButton.textContent = "削除";
          deleteButton.dataset.action = "delete";
          deleteButton.dataset.id = item.id;

          actions.append(loadButton, textButton, deleteButton);
          card.append(preview, title, meta, actions);
          dom.historyList.append(card);
        });

        updateActionButtons();
      }

      function hashString(input) {
        let hash = 0x811c9dc5;
        for (let index = 0; index < input.length; index += 1) {
          hash ^= input.charCodeAt(index);
          hash = Math.imul(hash, 0x01000193);
        }
        return "svg-" + (hash >>> 0).toString(16).padStart(8, "0") + "-" + input.length;
      }

      async function refreshHistory() {
        const rawItems = await StorageService.getAll();
        state.historyItems = rawItems.map(normalizeHistoryRecord);
        pruneHistoryPreviewCache(state.historyItems);
        renderHistoryList();
      }

      async function saveCurrentToHistory(format) {
        if (!state.currentDocument) return;
        const now = Date.now();
        const { definition, rendered } = state.currentDocument;
        const id = hashString(rendered.exportSvgString);
        const existing = await StorageService.get(id);
        const formats = new Set(existing && Array.isArray(existing.exportFormats) ? existing.exportFormats : []);
        formats.add(format.toUpperCase());
        const record = {
          id,
          label: rendered.label,
          svg: rendered.exportSvgString,
          width: definition.dimensions.width,
          height: definition.dimensions.height,
          createdAt: existing ? existing.createdAt : now,
          updatedAt: now,
          exportFormats: [...formats],
          textItemCount: definition.textItems.length,
          schemaVersion: HISTORY_SCHEMA_VERSION
        };
        await StorageService.put(record);
        state.selectedHistoryId = id;
        await refreshHistory();
      }

      function parseAndRender(rawSvg, options = {}) {
        if (!rawSvg.trim()) {
          resetLoadedDocumentState();
          setStatus("入力待機中");
          return false;
        }

        const parsed = SvgService.parse(rawSvg);
        if (!parsed.ok) {
          resetLoadedDocumentState();
          setStatus(parsed.message, true);
          if (options.showNotice) {
            DialogService.notice("SVGを確認してください", parsed.message);
          }
          return false;
        }

        state.currentDocument = {
          definition: parsed.definition,
          rendered: parsed.rendered
        };
        state.focusedTextId = null;
        setSvgInputLock(true);
        renderTextFieldList();
        if (!composeCurrentDocument()) {
          return false;
        }
        setStatus(parsed.definition.textItems.length ? "表示テキストをまとめて編集できます。" : "表示テキストは見つかりません。");
        return true;
      }

      function schedulePreview() {
        if (dom.svgInput.readOnly) return;
        window.clearTimeout(state.previewTimer);
        state.previewTimer = window.setTimeout(() => {
          parseAndRender(dom.svgInput.value);
        }, PREVIEW_DEBOUNCE_MS);
      }

      async function withBusy(task) {
        if (state.isBusy) return;
        state.isBusy = true;
        updateActionButtons();
        try {
          await task();
        } finally {
          state.isBusy = false;
          updateActionButtons();
        }
      }

      async function handleExport(format) {
        window.clearTimeout(state.textEditTimer);
        if (state.currentDocument) {
          if (!composeCurrentDocument()) {
            return;
          }
        } else if (!parseAndRender(dom.svgInput.value, { showNotice: true })) {
          return;
        }

        await withBusy(async () => {
          try {
            setStatus(format === "png" ? "画像を書き出しています…" : "PDFを書き出しています…");
            if (format === "png") {
              await ExportService.saveAsPng(state.currentDocument.rendered);
            } else {
              await ExportService.saveAsPdf(state.currentDocument.rendered);
            }
            await saveCurrentToHistory(format);
            setStatus((format === "png" ? "画像" : "PDF") + "を保存しました。履歴にも記録しました。");
          } catch (error) {
            console.error(error);
            setStatus("保存に失敗しました。SVGの内容を確認してください。", true);
            await DialogService.notice("保存できませんでした", error.message || "SVGの内容を確認してください。");
          }
        });
      }

      async function loadHistoryItem(id) {
        if (state.isBusy) return;
        const item = state.historyItems.find((entry) => entry.id === id);
        if (!item) return;
        state.selectedHistoryId = id;
        state.focusedTextId = null;
        dom.svgInput.value = item.svg;
        parseAndRender(item.svg);
        renderHistoryList();
        setStatus("履歴から内容を読み込みました。");
      }

      async function deleteHistoryItem(id) {
        if (state.isBusy) return;
        const item = state.historyItems.find((entry) => entry.id === id);
        if (!item) return;
        const confirmed = await DialogService.confirm(
          "履歴を削除しますか",
          "選択した履歴を削除します。あとから元に戻すことはできません。",
          { confirmText: "削除する", cancelText: "やめる", danger: true }
        );
        if (!confirmed) return;
        await withBusy(async () => {
          await StorageService.remove(id);
          if (state.selectedHistoryId === id) {
            state.selectedHistoryId = null;
          }
          await refreshHistory();
          setStatus("履歴を削除しました。");
        });
      }

      function downloadHistoryText(id) {
        const item = state.historyItems.find((entry) => entry.id === id);
        if (!item) return;
        ExportService.saveTextFile(item.svg, ExportService.buildHistoryTextFilename(item.label || item.id));
        setStatus("SVGコードをTXT形式で保存しました。");
      }

      function bindEvents() {
        dom.svgInput.addEventListener("input", () => {
          state.selectedHistoryId = null;
          if (!dom.svgInput.value.trim()) {
            setStatus("入力待機中");
          } else if (state.statusIsError) {
            state.statusIsError = false;
            dom.statusLine.classList.remove("is-error");
            updateStatusLineVisibility();
          } else {
            updateStatusLineVisibility();
          }
          updateActionButtons();
          schedulePreview();
          renderHistoryList();
        });
        dom.clearButton.addEventListener("click", async () => {
          if (!dom.svgInput.value.trim()) return;
          const confirmed = await DialogService.confirm(
            "入力内容をクリアしますか",
            state.currentDocument
              ? "入力欄を空の状態へ戻します。"
              : "現在入力している SVG コードを消去します。",
            { confirmText: "クリアする", cancelText: "やめる" }
          );
          if (!confirmed) return;
          window.clearTimeout(state.previewTimer);
          dom.svgInput.value = "";
          state.selectedHistoryId = null;
          resetLoadedDocumentState();
          renderHistoryList();
          setStatus("新しいSVGを貼り付けてください。");
        });
        dom.saveImageButton.addEventListener("click", () => handleExport("png"));
        dom.savePdfButton.addEventListener("click", () => handleExport("pdf"));
        dom.textFieldList.addEventListener("input", (event) => {
          const target = event.target;
          if (!(target instanceof HTMLTextAreaElement)) return;
          if (target.dataset.editorMode === "bulk") {
            updateBulkTextValue(target.value);
            return;
          }
          const id = target.dataset.textId;
          if (!id) return;
          updateTextItemValue(id, target.value);
        });
        dom.textFieldList.addEventListener("focusin", (event) => {
          const target = event.target;
          if (!(target instanceof HTMLTextAreaElement)) return;
          setFocusedTextId(target.dataset.textId || null);
        });
        dom.textFieldList.addEventListener("focusout", () => {
          window.setTimeout(() => {
            if (!dom.textFieldList.contains(document.activeElement)) {
              setFocusedTextId(null);
            }
          }, 0);
        });
        dom.clearHistoryButton.addEventListener("click", async () => {
          if (!state.historyItems.length) return;
          const confirmed = await DialogService.confirm(
            "履歴をすべて削除しますか",
            "保存済みの履歴をすべて削除します。あとから元に戻すことはできません。",
            { confirmText: "すべて削除", cancelText: "やめる", danger: true }
          );
          if (!confirmed) return;
          await withBusy(async () => {
            await StorageService.clear();
            state.historyItems = [];
            state.selectedHistoryId = null;
            historyPreviewCache.clear();
            renderHistoryList();
            setStatus("履歴をすべて削除しました。");
          });
        });
        dom.historyList.addEventListener("click", (event) => {
          const target = event.target;
          if (!(target instanceof HTMLElement)) return;
          const action = target.dataset.action;
          const id = target.dataset.id;
          if (!action || !id) return;
          if (action === "load") {
            loadHistoryItem(id);
          } else if (action === "download-text") {
            downloadHistoryText(id);
          } else if (action === "delete") {
            deleteHistoryItem(id);
          }
        });
      }

      async function init() {
        HapticService.bind();
        bindEvents();
        await StorageService.init();
        await refreshHistory();
        renderTextFieldList();
        setSvgInputLock(false);
        clearPreview();
        setStatus("入力待機中");
        updateActionButtons();
      }

      init().catch((error) => {
        console.error(error);
        setStatus("初期化に失敗しました。ページを再読み込みしてください。", true);
        DialogService.notice("初期化エラー", "ページの準備に失敗しました。再読み込み後も改善しない場合は、ブラウザを変更してお試しください。");
      });
    })();
  </script>
